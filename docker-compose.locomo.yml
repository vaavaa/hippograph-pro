services:
  hippograph-locomo:
    build: .
    container_name: hippograph-locomo
    ports:
      - "5004:5000"
    volumes:
      - ./data/benchmark:/app/data
      - ./src:/app/src
      - ./benchmark:/app/benchmark
    environment:
      - DB_PATH=/app/data/locomo_test.db
      - FLASK_PORT=5000
      - FLASK_DEBUG=false
      - NEURAL_API_KEY=locomo_key_2026
      - ACTIVATION_ITERATIONS=3
      - ACTIVATION_DECAY=0.7
      - SIMILARITY_THRESHOLD=0.5
      - HALF_LIFE_DAYS=30
      - ENTITY_EXTRACTOR=spacy
      - EMBEDDING_MODEL=sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - BLEND_ALPHA=0.6
      - BLEND_GAMMA=0.15
      - BLEND_DELTA=0.1
      - RERANK_ENABLED=true
      - RERANK_TOP_N=20
      - RERANK_WEIGHT=0.3
      - USE_ANN_INDEX=true
      - ANN_INDEX_TYPE=HNSW
      - HNSW_M=32
      - HNSW_EF_CONSTRUCTION=64
      - HNSW_EF_SEARCH=32
    restart: "no"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
